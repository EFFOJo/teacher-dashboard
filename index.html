<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teachers Dashboard</title>
<style>
  :root {
    --primary-color: #112d5d;
    --bg-light: #f8f9fa;
    --border-color: #e2e8f0;
    --text-dark: #333333;
    --text-muted: #64748b;
    --success-color: #22c55e;
    --danger-color: #ef4444;
    --warning-color: #f59e0b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background-color: var(--bg-light); color: var(--text-dark);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    background-color: #ffffff; border-bottom: 1px solid var(--border-color);
    display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; height: 70px;
  }
  .school-info h1 { font-size: 18px; font-weight: 700; color: var(--primary-color); }
  .school-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .user-profile { display: flex; align-items: center; gap: 12px; }
  .avatar {
    background-color: var(--primary-color); color: white; width: 38px; height: 38px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
  }
  .logout-btn {
    background: transparent; border: 1px solid var(--border-color); padding: 6px 12px;
    border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .logout-btn:hover { background-color: #fee2e2; color: var(--danger-color); }
  .dashboard-container { display: flex; flex: 1; overflow: hidden; }
  sidebar {
    width: 320px; background-color: #ffffff; border-right: 1px solid var(--border-color);
    display: flex; flex-direction: column; padding: 20px; justify-content: space-between;
  }
  .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dark); font-weight: 700; margin-bottom: 15px; }
  .input-group { margin-bottom: 25px; }
  input, select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border-color);
    border-radius: 8px; font-size: 14px; background-color: var(--bg-light); margin-bottom: 10px; outline: none;
  }
  input:focus, select:focus { border-color: var(--primary-color); }
  .btn {
    width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; border: none; margin-bottom: 10px;
  }
  .btn-primary { background-color: var(--primary-color); color: white; }
  .btn-primary:hover { background-color: #0b2046; }
  .btn-outline { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-dark); }
  .btn-outline:hover { background-color: var(--bg-light); }
  .btn-danger { background-color: #fee2e2; color: var(--danger-color); border: 1px solid #fecaca; }
  .btn-danger:hover { background-color: var(--danger-color); color: white; }
  
  .list-panel { width: 340px; background-color: #ffffff; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
  .main-content { flex: 1; background-color: var(--bg-light); display: flex; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }
  .empty-state { text-align: center; color: var(--text-muted); }
  .empty-state-icon { font-size: 48px; margin-bottom: 10px; color: #cbd5e1; }
  
  .teacher-item { padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; background-color: #ffffff; }
  .teacher-item:hover, .teacher-item.active { border-color: var(--primary-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .teacher-item h4 { font-size: 15px; color: var(--text-dark); margin-bottom: 6px; }
  .behavior-badges { display: flex; gap: 8px; font-size: 11px; font-weight: 600; flex-wrap: wrap; }
  .badge { padding: 2px 8px; border-radius: 4px; }
  .badge-pos { background-color: #e8f5e9; color: var(--success-color); }
  .badge-neg { background-color: #ffebee; color: var(--danger-color); }
  .badge-late { background-color: #fffbeb; color: var(--warning-color); }
  
  .profile-card { background: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; width: 100%; max-width: 620px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
  .profile-header { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
  .profile-header h2 { color: var(--primary-color); font-size: 22px; }
  
  .timer-card { background-color: #fffbeb; border: 1px solid #fef3c7; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .timer-display { font-family: monospace; font-size: 24px; font-weight: bold; color: #b45309; }
  .timer-controls { display: flex; gap: 8px; }
  .timer-btn { padding: 6px 12px; font-size: 12px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
  .timer-start { background-color: var(--warning-color); color: white; }
  .timer-stop { background-color: var(--success-color); color: white; }

  .behavior-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .behavior-box { border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; text-align: center; }
  .counter-val { font-size: 28px; font-weight: 700; margin-top: 5px; }
  .breakdown-list { text-align: left; margin-top: 10px; font-size: 12px; color: var(--text-muted); border-top: 1px dotted var(--border-color); padding-top: 8px; }
  .breakdown-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .breakdown-actions { display: flex; gap: 4px; }
  .mini-btn { border: none; background: #f1f5f9; color: var(--text-dark); padding: 2px 6px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; }
  .mini-btn:hover { background: #e2e8f0; }
  .mini-btn.minus:hover { background: #fee2e2; color: var(--danger-color); }
  .mini-btn.plus:hover { background: #dcfce7; color: var(--success-color); }
  
  .action-zone h4 { font-size: 14px; color: var(--text-dark); margin-bottom: 8px; }
  .action-container { display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border-color); padding: 15px; border-radius: 8px; background-color: var(--bg-light); }
  .action-row { display: flex; align-items: center; gap: 10px; }
  .action-row select, .action-row input { margin-bottom: 0; flex: 1; background: white; }
  .btn-action { width: auto; white-space: nowrap; margin-bottom: 0; padding: 10px 16px; }
  .btn-inc-pos { background-color: var(--success-color); color: white; }
  .btn-inc-pos:hover { background-color: #16a34a; }
  .btn-inc-neg { background-color: var(--danger-color); color: white; }
  .btn-inc-neg:hover { background-color: #dc2626; }
  
  .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
  .auth-container h2 { color: var(--primary-color); margin-bottom: 15px; font-size: 20px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="authView" class="auth-container">
  <div id="registerForm">
    <h2>Create Account</h2>
    <input id="newUser" placeholder="Email Address">
    <input id="newPass" type="password" placeholder="Password (min 6 chars)">
    <button class="btn btn-primary" onclick="register()">Create Account</button>
    <button class="btn btn-outline" onclick="toggleAuth(false)">Go to Login</button>
  </div>
  
  <div id="loginForm" class="hidden">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Email Address">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
    <button class="btn btn-outline" onclick="toggleAuth(true)">Go to Create Account</button>
  </div>
</div>

<div id="appView" class="hidden" style="display: flex; flex-direction: column; flex: 1;">
  <header>
    <div class="school-info">
      <h1>Teachers Dashboard</h1>
      <p>we hate teachers ✌</p>
    </div>
    <div class="user-profile">
      <span id="currentUser" style="font-size: 14px; font-weight: 500; color: var(--text-dark);"></span>
      <div class="avatar" id="userAvatar">TE</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="dashboard-container">
    <sidebar>
      <div>
        <h3 class="section-title">Management Tools</h3>
        <input id="searchTeachers" placeholder="Search teachers..." oninput="renderTeachersList()">
        <div class="input-group">
          <input id="teacherName" placeholder="Enter teacher name...">
          <button class="btn btn-primary" onclick="addTeacher()">+ Add teacher</button>
        </div>
      </div>
      <div>
        <button class="btn btn-outline" onclick="exportDataToJSON()">⬇ Backup JSON</button>
        <button class="btn btn-outline" onclick="document.getElementById('importFileInput').click()">⬆ Import JSON</button>
        <input type="file" id="importFileInput" class="hidden" accept=".json" onchange="importDataFromJSON(event)">
      </div>
    </sidebar>

    <div class="list-panel">
      <h3 class="section-title">Teachers</h3>
      <div id="teachersList"></div>
    </div>

    <div class="main-content" id="focusArea">
      <div class="empty-state">
        <div class="empty-state-icon">👤</div>
        <p>Select a teacher from the list to track metrics and running late parameters</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBox4mE3gkzXhwlotSdUT4JZl2zHCuOY2c",
  authDomain: "teacher-dashboard-9690e.firebaseapp.com",
  projectId: "teacher-dashboard-9690e",
  storageBucket: "teacher-dashboard-9690e.firebasestorage.app",
  messagingSenderId: "815206301540",
  appId: "1:815206301540:web:4535455a858c04a8648471"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let teachers = [];
let selectedTeacherId = null;
let currentUserId = null;
let currentUserEmail = "";

let activeInterval = null;
let currentSecondsElapsed = 0;

const defaultPositiveBehaviors = ["Excellent Explanation", "Helping Students", "Organized Lesson"];
const defaultNegativeBehaviors = ["Getting mad and looking for problems", "Shouting at students", "Loving Elias"];

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUserId = user.uid;
    currentUserEmail = user.email;
    document.getElementById("authView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    document.getElementById("currentUser").textContent = user.email;
    document.getElementById("userAvatar").textContent = user.email.substring(0,2).toUpperCase();
    listenToTeachersData();
  } else {
    currentUserId = null;
    currentUserEmail = "";
    document.getElementById("authView").classList.remove("hidden");
    document.getElementById("appView").classList.add("hidden");
    resetLocalTimerState();
  }
});

window.register = async function() {
  const email = document.getElementById("newUser").value.trim();
  const pass = document.getElementById("newPass").value;
  try { await createUserWithEmailAndPassword(auth, email, pass); } catch(err) { alert(err.message); }
}

window.login = async function() {
  const email = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  try { await signInWithEmailAndPassword(auth, email, pass); } catch(err) { alert("Login Error: " + err.message); }
}

window.logout = function() { resetLocalTimerState(); signOut(auth); }
window.toggleAuth = function(showRegister) {
  document.getElementById('registerForm').classList.toggle('hidden', !showRegister);
  document.getElementById('loginForm').classList.toggle('hidden', showRegister);
}

function listenToTeachersData() {
  if (!currentUserId) return;
  // Privacy isolation constraint added
  const userSpecificQuery = query(collection(db, "teachers"), where("userId", "==", currentUserId));
  
  onSnapshot(userSpecificQuery, (snapshot) => {
    teachers = [];
    snapshot.forEach(doc => { teachers.push({ id: doc.id, ...doc.data() }); });
    renderTeachersList();
    if(selectedTeacherId) {
      const idx = teachers.findIndex(t => t.id === selectedTeacherId);
      if(idx !== -1) {
        updateFocusCardsUI(idx);
      } else {
        resetLocalTimerState();
      }
    }
  });
}

window.addTeacher = async function() {
  const name = document.getElementById("teacherName").value.trim();
  if(!name) return alert("Enter teacher name");
  
  const initialPos = {}; defaultPositiveBehaviors.forEach(b => initialPos[b] = 0);
  const initialNeg = {}; defaultNegativeBehaviors.forEach(b => initialNeg[b] = 0);

  try {
    await addDoc(collection(db, "teachers"), {
      name: name, 
      userId: currentUserId,
      positive: 0, 
      negative: 0, 
      minutesLate: 0, 
      posBreakdown: initialPos, 
      negBreakdown: initialNeg
    });
    document.getElementById("teacherName").value = "";
    
    // Auto trigger verification thank you confirmation message
    sendThankYouEmail(name);
  } catch(e) { alert("Data Error: " + e.message); }
}

function sendThankYouEmail(teacherName) {
  const subject = encodeURIComponent("Teacher Track Node Initialized Successfully");
  const body = encodeURIComponent(`Hello,\n\nThis confirmation verifies that a new track profile for "${teacherName}" has been successfully added to your private profile registry.\n\nThank you for using the Teachers Dashboard.\n\nBest regards,\nPlatform Administration Panel`);
  window.location.href = `mailto:${currentUserEmail}?subject=${subject}&body=${body}`;
}

window.removeTeacher = async function(id) {
  if(!confirm("Are you sure you want to completely delete this teacher from the platform?")) return;
  try {
    resetLocalTimerState();
    await deleteDoc(doc(db, "teachers", id));
    document.getElementById("focusArea").innerHTML = `<div class="empty-state"><div class="empty-state-icon">👤</div><p>Teacher profile deleted successfully.</p></div>`;
    selectedTeacherId = null;
  } catch(e) { alert("Delete error: " + e.message); }
}

window.exportDataToJSON = function() {
  if(teachers.length === 0) return alert("No teacher data found to back up!");
  const exportPayload = teachers.map(({ id, ...data }) => data);
  const jsonString = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportPayload, null, 2));
  
  const downloadAnchor = document.createElement('a');
  downloadAnchor.setAttribute("href", jsonString);
  downloadAnchor.setAttribute("download", `teachers_backup_${new Date().toISOString().slice(0,10)}.json`);
  document.body.appendChild(downloadAnchor);
  downloadAnchor.click();
  downloadAnchor.remove();
}

window.importDataFromJSON = function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const parsedData = JSON.parse(e.target.result);
      if (!Array.isArray(parsedData)) throw new Error("JSON sequence configuration mismatch.");

      if(!confirm(`Proceed to inject ${parsedData.length} teacher metrics records into your live Firestore collection?`)) return;

      for (const t of parsedData) {
        await addDoc(collection(db, "teachers"), {
          name: t.name || "Unknown Teacher",
          userId: currentUserId,
          positive: t.positive || 0,
          negative: t.negative || 0,
          minutesLate: t.minutesLate || 0,
          posBreakdown: t.posBreakdown || {},
          negBreakdown: t.negBreakdown || {}
        });
      }
      alert("All records parsed and written successfully!");
      event.target.value = "";
    } catch(err) {
      alert("Failed to read JSON backup correctly: " + err.message);
    }
  };
  reader.readAsText(file);
}

window.startLateTimer = function() {
  if(activeInterval) return;
  document.getElementById("timerBtnStart").classList.add("hidden");
  document.getElementById("timerBtnStop").classList.remove("hidden");
  
  activeInterval = setInterval(() => {
    currentSecondsElapsed++;
    const minutes = Math.floor(currentSecondsElapsed / 60);
    const seconds = currentSecondsElapsed % 60;
    const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    const liveClockEl = document.getElementById("liveClock");
    if(liveClockEl) {
      liveClockEl.textContent = timeString;
    }
  }, 1000);
}

window.stopLateTimer = async function() {
  if(!activeInterval) return;
  clearInterval(activeInterval);
  activeInterval = null;

  const totalMinutesCalculated = Math.round(currentSecondsElapsed / 60) || 1;
  const teacher = teachers.find(t => t.id === selectedTeacherId);
  
  if(teacher) {
    const currentLateRecord = teacher.minutesLate || 0;
    await updateDoc(doc(db, "teachers", selectedTeacherId), { minutesLate: currentLateRecord + totalMinutesCalculated });
    alert(`Logged ${totalMinutesCalculated} additional minute(s) late for ${teacher.name}`);
  }
  
  currentSecondsElapsed = 0;
  const btnStart = document.getElementById("timerBtnStart");
  const btnStop = document.getElementById("timerBtnStop");
  const clockText = document.getElementById("liveClock");
  
  if(btnStart) btnStart.classList.remove("hidden");
  if(btnStop) btnStop.classList.add("hidden");
  if(clockText) clockText.textContent = "00:00";
}

function resetLocalTimerState() {
  if(activeInterval) { clearInterval(activeInterval); activeInterval = null; }
  currentSecondsElapsed = 0;
}

window.adjustPosBehavior = async function(key, amount) {
  const teacher = teachers.find(t => t.id === selectedTeacherId);
  if(!teacher) return;
  let currentVal = teacher.posBreakdown[key] || 0;
  if(currentVal + amount < 0) return;
  teacher.posBreakdown[key] = currentVal + amount;
  await updateDoc(doc(db, "teachers", selectedTeacherId), {
    posBreakdown: teacher.posBreakdown, positive: Object.values(teacher.posBreakdown).reduce((a,b)=>a+b, 0)
  });
}

window.adjustNegBehavior = async function(key, amount) {
  const teacher = teachers.find(t => t.id === selectedTeacherId);
  if(!teacher) return;
  let currentVal = teacher.negBreakdown[key] || 0;
  if(currentVal + amount < 0) return;
  teacher.negBreakdown[key] = currentVal + amount;
  await updateDoc(doc(db, "teachers", selectedTeacherId), {
    negBreakdown: teacher.negBreakdown, negative: Object.values(teacher.negBreakdown).reduce((a,b)=>a+b, 0)
  });
}

window.clearAndAddCustomBehavior = async function(type) {
  const teacher = teachers.find(t => t.id === selectedTeacherId);
  if(!teacher) return;
  if(type === 'pos') {
    const input = document.getElementById("newPosName"); const val = input.value.trim(); if(!val) return;
    teacher.posBreakdown[val] = 0;
    await updateDoc(doc(db, "teachers", selectedTeacherId), { posBreakdown: teacher.posBreakdown });
    input.value = "";
  } else {
    const input = document.getElementById("newNegName"); const val = input.value.trim(); if(!val) return;
    teacher.negBreakdown[val] = 0;
    await updateDoc(doc(db, "teachers", selectedTeacherId), { negBreakdown: teacher.negBreakdown });
    input.value = "";
  }
}

window.viewTeacher = function(index) {
  const t = teachers[index];
  if(selectedTeacherId !== t.id) { resetLocalTimerState(); }
  selectedTeacherId = t.id;
  updateFocusCardsUI(index);
}

function updateFocusCardsUI(index) {
  const t = teachers[index];
  if (!t) return;
  
  document.querySelectorAll('.teacher-item').forEach((el) => {
    el.classList.toggle('active', el.getAttribute('data-id') === t.id);
  });

  let posListHTML = "";
  for(let key in t.posBreakdown) {
    posListHTML += `<div class="breakdown-item"><span>${key}:</span><div class="breakdown-actions"><strong style="margin-right:6px;">${t.posBreakdown[key]}</strong><button class="mini-btn minus" onclick="adjustPosBehavior('${key}', -1)">&minus;</button><button class="mini-btn plus" onclick="adjustPosBehavior('${key}', 1)">&plus;</button></div></div>`;
  }

  let negListHTML = "";
  for(let key in t.negBreakdown) {
    negListHTML += `<div class="breakdown-item"><span>${key}:</span><div class="breakdown-actions"><strong style="margin-right:6px;">${t.negBreakdown[key]}</strong><button class="mini-btn minus" onclick="adjustNegBehavior('${key}', -1)">&minus;</button><button class="mini-btn plus" onclick="adjustNegBehavior('${key}', 1)">&plus;</button></div></div>`;
  }

  // Preserve clock layout status across real-time rendering changes
  const computedMinutes = Math.floor(currentSecondsElapsed / 60).toString().padStart(2, '0');
  const computedSeconds = (currentSecondsElapsed % 60).toString().padStart(2, '0');
  const clockTextVal = activeInterval ? `${computedMinutes}:${computedSeconds}` : "00:00";

  document.getElementById("focusArea").innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        <div>
          <h2>${t.name}</h2>
          <p style="color:var(--text-muted); font-size:13px; margin-top:4px;">Core Behavior Tracking & Sync Center</p>
        </div>
        <button class="btn btn-action btn-danger" style="padding: 6px 12px; font-size:12px;" onclick="removeTeacher('${t.id}')">Delete Teacher</button>
      </div>

      <div class="timer-card">
        <div>
          <div style="font-weight: 700; font-size:13px; color:#92400e;">Late Tracking Stopwatch</div>
          <div style="font-size:11px; color:#b45309;">Start timer if the teacher isn't inside class yet.</div>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
          <div class="timer-display" id="liveClock">${clockTextVal}</div>
          <div class="timer-controls">
            <button id="timerBtnStart" class="timer-btn timer-start ${activeInterval ? 'hidden' : ''}" onclick="startLateTimer()">▶ Start Timer</button>
            <button id="timerBtnStop" class="timer-btn timer-stop ${activeInterval ? '' : 'hidden'}" onclick="stopLateTimer()">✔ Arrived</button>
          </div>
        </div>
      </div>
      
      <div class="behavior-grid">
        <div class="behavior-box" style="border-top: 4px solid var(--success-color);"><div style="color: var(--success-color); font-weight:600; font-size:13px;">Positive Behaviours</div><div class="counter-val" style="color: var(--success-color);">${t.positive || 0}</div><div class="breakdown-list">${posListHTML}</div></div>
        <div class="behavior-box" style="border-top: 4px solid var(--danger-color);"><div style="color: var(--danger-color); font-weight:600; font-size:13px;">Negative Behaviours</div><div class="counter-val" style="color: var(--danger-color);">${t.negative || 0}</div><div class="breakdown-list">${negListHTML}</div></div>
      </div>
      
      <div class="action-zone">
        <h4>Manage Metrics Configurations</h4>
        <div class="action-container">
          <div class="action-row"><input id="newPosName" placeholder="Create new positive item option..."><button class="btn btn-action btn-inc-pos" onclick="clearAndAddCustomBehavior('pos')">Add Option</button></div>
          <div class="action-row" style="border-top: 1px dashed var(--border-color); padding-top: 12px;"><input id="newNegName" placeholder="Create new negative item option..."><button class="btn btn-action btn-inc-neg" onclick="clearAndAddCustomBehavior('neg')">Add Option</button></div>
        </div>
      </div>
    </div>`;
}

function renderTeachersList(){
  const container = document.getElementById("teachersList"); container.innerHTML = "";
  const queryText = document.getElementById("searchTeachers") ? document.getElementById("searchTeachers").value.toLowerCase().trim() : "";
  
  const filtered = teachers.filter(t => t.name.toLowerCase().includes(queryText));

  if(filtered.length === 0) {
    container.innerHTML = `<p style="color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 20px;">No records synced yet.</p>`;
    return;
  }
  filtered.forEach((t)=>{
    const idx = teachers.findIndex(original => original.id === t.id);
    const div = document.createElement("div");
    div.className = `teacher-item ${selectedTeacherId === t.id ? 'active' : ''}`;
    div.setAttribute("data-id", t.id);
    div.setAttribute("onclick", `viewTeacher(${idx})`);
    div.innerHTML = `
      <h4>${t.name}</h4>
      <div class="behavior-badges">
        <span class="badge badge-pos">Pos: ${t.positive || 0}</span>
        <span class="badge badge-neg">Neg: ${t.negative || 0}</span>
        <span class="badge badge-late">Late: ${t.minutesLate || 0}m</span>
      </div>`;
    container.appendChild(div);
  });
}
</script>
</body>
</html>

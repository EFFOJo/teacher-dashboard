<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Khalifa Al Suwaidi School - Teacher Dashboard</title>
<style>
  :root {
    --primary-color: #112d5d;
    --bg-light: #f8f9fa;
    --border-color: #e2e8f0;
    --text-dark: #333333;
    --text-muted: #64748b;
    --success-color: #22c55e;
    --danger-color: #ef4444;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-dark);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* --- Top Navigation Header --- */
  header {
    background-color: #ffffff;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    height: 70px;
  }

  .school-info h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--primary-color);
  }

  .school-info p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    background-color: var(--primary-color);
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
  }

  .logout-btn {
    background: transparent;
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    background-color: #fee2e2;
    color: var(--danger-color);
  }

  /* --- Main Dashboard Layout --- */
  .dashboard-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Left Sidebar */
  sidebar {
    width: 320px;
    background-color: #ffffff;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 20px;
    justify-content: space-between;
  }

  .section-title {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dark);
    font-weight: 700;
    margin-bottom: 15px;
  }

  .input-group {
    margin-bottom: 25px;
  }

  input, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 14px;
    background-color: var(--bg-light);
    margin-bottom: 10px;
    outline: none;
  }

  input:focus, select:focus {
    border-color: var(--primary-color);
  }

  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
    border: none;
    margin-bottom: 10px;
  }

  .btn-primary {
    background-color: var(--primary-color);
    color: white;
  }

  .btn-primary:hover {
    background-color: #0b2046;
  }

  .btn-outline {
    background-color: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-dark);
  }

  .btn-outline:hover {
    background-color: var(--bg-light);
  }

  /* Center Workspace Panel */
  .list-panel {
    width: 340px;
    background-color: #ffffff;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
  }

  /* Right Dynamic Work Area */
  .main-content {
    flex: 1;
    background-color: var(--bg-light);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    overflow-y: auto;
  }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 10px;
    color: #cbd5e1;
  }

  /* --- Dynamic Component Cards --- */
  .teacher-item {
    padding: 14px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background-color: #ffffff;
  }

  .teacher-item:hover, .teacher-item.active {
    border-color: var(--primary-color);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }

  .teacher-item h4 {
    font-size: 15px;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .behavior-badges {
    display: flex;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge {
    padding: 2px 8px;
    border-radius: 4px;
  }

  .badge-pos { background-color: #e8f5e9; color: var(--success-color); }
  .badge-neg { background-color: #ffebee; color: var(--danger-color); }

  /* Focus Profile Layout */
  .profile-card {
    background: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    width: 100%;
    max-width: 580px;
    padding: 30px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02);
  }

  .profile-header {
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 20px;
    margin-bottom: 24px;
  }

  .profile-header h2 {
    color: var(--primary-color);
    font-size: 22px;
  }

  .behavior-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .behavior-box {
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .counter-val {
    font-size: 28px;
    font-weight: 700;
    margin-top: 5px;
  }

  .breakdown-list {
    text-align: left;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px dotted var(--border-color);
    padding-top: 8px;
  }

  .breakdown-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .breakdown-actions {
    display: flex;
    gap: 4px;
  }

  .mini-btn {
    border: none;
    background: #f1f5f9;
    color: var(--text-dark);
    padding: 2px 6px;
    font-size: 11px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
  }
  .mini-btn:hover { background: #e2e8f0; }
  .mini-btn.minus:hover { background: #fee2e2; color: var(--danger-color); }
  .mini-btn.plus:hover { background: #dcfce7; color: var(--success-color); }

  .action-zone h4 {
    font-size: 14px;
    color: var(--text-dark);
    margin-bottom: 8px;
  }

  .action-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    border: 1px solid var(--border-color);
    padding: 15px;
    border-radius: 8px;
    background-color: var(--bg-light);
  }

  .action-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .action-row select, .action-row input {
    margin-bottom: 0;
    flex: 1;
    background: white;
  }

  .btn-action {
    width: auto;
    white-space: nowrap;
    margin-bottom: 0;
    padding: 10px 16px;
  }

  .btn-inc-pos { background-color: var(--success-color); color: white; }
  .btn-inc-pos:hover { background-color: #16a34a; }
  .btn-inc-neg { background-color: var(--danger-color); color: white; }
  .btn-inc-neg:hover { background-color: #dc2626; }

  .auth-container {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
  }

  .auth-container h2 {
    color: var(--primary-color);
    margin-bottom: 15px;
    font-size: 20px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="authView" class="auth-container">
  <div id="registerForm">
    <h2>Create Account</h2>
    <input id="newUser" placeholder="Username">
    <input id="newPass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="register()">Create Account</button>
    <button class="btn btn-outline" onclick="toggleAuth(false)">Go to Login</button>
  </div>
  
  <div id="loginForm" class="hidden">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
    <button class="btn btn-outline" onclick="toggleAuth(true)">Go to Create Account</button>
  </div>
</div>

<div id="appView" class="hidden" style="display: flex; flex-direction: column; flex: 1;">
  <header>
    <div class="school-info">
      <h1>Ahmed Khalifa Al Suwaidi School</h1>
      <p>Cluster 4-4 &middot; Abu Dhabi &middot; 2025&ndash;2026</p>
    </div>
    <div class="user-profile">
      <span id="currentUser" style="font-size: 14px; font-weight: 500; color: var(--text-dark);"></span>
      <div class="avatar" id="userAvatar">TE</div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="dashboard-container">
    <sidebar>
      <div>
        <h3 class="section-title">Management Tools</h3>
        <div class="input-group">
          <input id="teacherName" placeholder="Enter teacher name...">
          <button class="btn btn-primary" onclick="addTeacher()">
            <span style="font-size:16px;">+</span> Add teacher
          </button>
        </div>
      </div>
      <div>
        <button class="btn btn-outline" onclick="alert('Backup completed successfully.')">&#x21E9; Backup</button>
        <button class="btn btn-outline" onclick="alert('Import function ready.')">&#x21E7; Import</button>
      </div>
    </sidebar>

    <div class="list-panel">
      <h3 class="section-title">Teachers</h3>
      <div id="teachersList"></div>
    </div>

    <div class="main-content" id="focusArea">
      <div class="empty-state">
        <div class="empty-state-icon">👤</div>
        <p>Select a teacher from the list to manage behaviours</p>
      </div>
    </div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users") || "{}");
let teachers = JSON.parse(localStorage.getItem("teachers") || "[]");
let selectedTeacherIndex = null;

// Baseline lists for standard behaviors
const defaultPositiveBehaviors = ["Excellent Explanation", "Helping Students", "Organized Lesson"];
const defaultNegativeBehaviors = ["Getting mad and looking for problems", "Shouting at students", "Loving Elias"];

function save(){
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("teachers", JSON.stringify(teachers));
}

function toggleAuth(showRegister) {
  if(showRegister) {
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
  } else {
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
  }
}

function register(){
  const u=newUser.value.trim();
  const p=newPass.value;
  if(!u||!p) return alert("Enter username and password");
  if(users[u]) return alert("User exists");
  users[u]={password:p};
  save();
  alert("Account created successfully!");
  toggleAuth(false);
}

function login(){
  const u=loginUser.value.trim();
  const p=loginPass.value;
  if(users[u] && users[u].password===p){
    localStorage.setItem("loggedInUser", u);
    showApp();
  } else {
    alert("Invalid login credentials");
  }
}

function logout(){
  localStorage.removeItem("loggedInUser");
  location.reload();
}

function showApp(){
  const user=localStorage.getItem("loggedInUser");
  if(!user) return;
  document.getElementById("authView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
  document.getElementById("currentUser").textContent = user;
  document.getElementById("userAvatar").textContent = user.substring(0,2).toUpperCase();
  renderTeachers();
}

function addTeacher(){
  const name=teacherName.value.trim();
  if(!name) return alert("Please type a teacher name");
  
  // Dynamic structural schema initialization
  const initialPosBreakdown = {};
  defaultPositiveBehaviors.forEach(b => initialPosBreakdown[b] = 0);
  
  const initialNegBreakdown = {};
  defaultNegativeBehaviors.forEach(b => initialNegBreakdown[b] = 0);

  teachers.push({
    name: name, 
    positive: 0, 
    negative: 0,
    posBreakdown: initialPosBreakdown,
    negBreakdown: initialNegBreakdown
  });
  
  save();
  teacherName.value="";
  renderTeachers();
}

/* Modifiers for behaviors */
function adjustPosBehavior(key, amount) {
  if(selectedTeacherIndex === null) return;
  let t = teachers[selectedTeacherIndex];
  
  if(!t.posBreakdown) t.posBreakdown = {};
  if(!t.posBreakdown[key]) t.posBreakdown[key] = 0;

  if(t.posBreakdown[key] + amount < 0) return; // Prevent negative counts
  
  t.posBreakdown[key] += amount;
  t.positive = Object.values(t.posBreakdown).reduce((a, b) => a + b, 0);
  
  save();
  renderTeachers();
  viewTeacher(selectedTeacherIndex);
}

function adjustNegBehavior(key, amount) {
  if(selectedTeacherIndex === null) return;
  let t = teachers[selectedTeacherIndex];
  
  if(!t.negBreakdown) t.negBreakdown = {};
  if(!t.negBreakdown[key]) t.negBreakdown[key] = 0;

  if(t.negBreakdown[key] + amount < 0) return; // Prevent negative counts
  
  t.negBreakdown[key] += amount;
  t.negative = Object.values(t.negBreakdown).reduce((a, b) => a + b, 0);
  
  save();
  renderTeachers();
  viewTeacher(selectedTeacherIndex);
}

/* Add completely unique new behaviors to choice pools */
function clearAndAddCustomBehavior(type) {
  if(selectedTeacherIndex === null) return;
  let t = teachers[selectedTeacherIndex];
  
  if(type === 'pos') {
    const input = document.getElementById("newPosName");
    const val = input.value.trim();
    if(!val) return;
    if(!t.posBreakdown) t.posBreakdown = {};
    if(t.posBreakdown[val] === undefined) t.posBreakdown[val] = 0;
    input.value = "";
  } else {
    const input = document.getElementById("newNegName");
    const val = input.value.trim();
    if(!val) return;
    if(!t.negBreakdown) t.negBreakdown = {};
    if(t.negBreakdown[val] === undefined) t.negBreakdown[val] = 0;
    input.value = "";
  }
  save();
  viewTeacher(selectedTeacherIndex);
}

function viewTeacher(index) {
  selectedTeacherIndex = index;
  
  document.querySelectorAll('.teacher-item').forEach((el, idx) => {
    if(idx === index) el.classList.add('active');
    else el.classList.remove('active');
  });

  const t = teachers[index];
  
  // Legacy fix safeguards
  if(!t.posBreakdown) {
    t.posBreakdown = {};
    defaultPositiveBehaviors.forEach(b => t.posBreakdown[b] = 0);
    t.positive = 0;
  }
  if(!t.negBreakdown) {
    t.negBreakdown = {};
    defaultNegativeBehaviors.forEach(b => t.negBreakdown[b] = 0);
    t.negative = 0;
  }

  const focusArea = document.getElementById("focusArea");
  
  // Build lists with inline quick add/remove buttons
  let posListHTML = "";
  for(let key in t.posBreakdown) {
    posListHTML += `
      <div class="breakdown-item">
        <span style="max-width: 170px; word-wrap: break-word;">${key}:</span>
        <div class="breakdown-actions">
          <strong style="margin-right:6px;">${t.posBreakdown[key]}</strong>
          <button class="mini-btn minus" onclick="adjustPosBehavior('${key}', -1)">&minus;</button>
          <button class="mini-btn plus" onclick="adjustPosBehavior('${key}', 1)">&plus;</button>
        </div>
      </div>`;
  }

  let negListHTML = "";
  for(let key in t.negBreakdown) {
    negListHTML += `
      <div class="breakdown-item">
        <span style="max-width: 170px; word-wrap: break-word;">${key}:</span>
        <div class="breakdown-actions">
          <strong style="margin-right:6px;">${t.negBreakdown[key]}</strong>
          <button class="mini-btn minus" onclick="adjustNegBehavior('${key}', -1)">&minus;</button>
          <button class="mini-btn plus" onclick="adjustNegBehavior('${key}', 1)">&plus;</button>
        </div>
      </div>`;
  }

  focusArea.innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        <h2>${t.name}</h2>
        <p style="color: var(--text-muted); font-size:13px; margin-top:4px;">Incident Dashboard & Activity Control Profile</p>
      </div>
      
      <div class="behavior-grid">
        <div class="behavior-box" style="border-top: 4px solid var(--success-color);">
          <div style="color: var(--success-color); font-weight:600; font-size:13px;">Positive Behaviours</div>
          <div class="counter-val" style="color: var(--success-color);">${t.positive}</div>
          <div class="breakdown-list">${posListHTML}</div>
        </div>
        
        <div class="behavior-box" style="border-top: 4px solid var(--danger-color);">
          <div style="color: var(--danger-color); font-weight:600; font-size:13px;">Negative Behaviours</div>
          <div class="counter-val" style="color: var(--danger-color);">${t.negative}</div>
          <div class="breakdown-list">${negListHTML}</div>
        </div>
      </div>
      
      <div class="action-zone">
        <h4>Create/Register New Options</h4>
        <div class="action-container">
          <div class="action-row">
            <input id="newPosName" placeholder="Create new positive behavior option...">
            <button class="btn btn-action btn-inc-pos" onclick="clearAndAddCustomBehavior('pos')">Add Option</button>
          </div>
          
          <div class="action-row" style="border-top: 1px dashed var(--border-color); padding-top: 12px;">
            <input id="newNegName" placeholder="Create new negative behavior option...">
            <button class="btn btn-action btn-inc-neg" onclick="clearAndAddCustomBehavior('neg')">Add Option</button>
          </div>
        </div>
        <p style="font-size:11px; color:var(--text-muted); margin-top:10px; text-align:center;">
          💡 Use the <b>+</b> and <b>-</b> buttons inside the boxes above to log incidents or remove mistakes.
        </p>
      </div>
    </div>
  `;
}

function renderTeachers(){
  const container = document.getElementById("teachersList");
  container.innerHTML = "";
  
  if(teachers.length === 0) {
    container.innerHTML = `<p style="color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 20px;">No teachers added yet</p>`;
    return;
  }

  teachers.forEach((t, i)=>{
    const div = document.createElement("div");
    div.className = `teacher-item ${selectedTeacherIndex === i ? 'active' : ''}`;
    div.setAttribute("onclick", `viewTeacher(${i})`);
    div.innerHTML = `
      <h4>${t.name}</h4>
      <div class="behavior-badges">
        <span class="badge badge-pos">Pos: ${t.positive || 0}</span>
        <span class="badge badge-neg">Neg: ${t.negative || 0}</span>
      </div>
    `;
    container.appendChild(div);
  });
}

showApp();
</script>
</body>
</html>
